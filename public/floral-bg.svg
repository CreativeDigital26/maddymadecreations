<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" opacity="0.35">
  <!-- Soft repeating floral pattern - delicate petals and leaves -->

  <!-- Top-left cluster -->
  <g transform="translate(60,60)" opacity="0.6">
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(120)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(180)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(240)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#a3c89a" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="4" fill="#d4af37" opacity="0.7"/>
  </g>

  <!-- Leaf sprigs -->
  <g transform="translate(100,30)" opacity="0.4">
    <path d="M0,0 Q8,-12 16,-8 Q8,0 0,0" fill="#7aad70"/>
    <path d="M0,0 Q-4,-14 4,-18 Q4,-4 0,0" fill="#7aad70"/>
  </g>

  <!-- Top-right cluster -->
  <g transform="translate(320,50)" opacity="0.5">
    <ellipse cx="0" cy="-12" rx="4" ry="9" fill="#c4dbbe" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="9" fill="#c4dbbe" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="9" fill="#c4dbbe" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="9" fill="#c4dbbe" transform="rotate(216)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="9" fill="#c4dbbe" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#d4af37" opacity="0.6"/>
  </g>

  <!-- Bottom-left large -->
  <g transform="translate(40,330)" opacity="0.45">
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(45)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(90)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(135)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(225)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(270)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="#a3c89a" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="5" fill="#d4af37" opacity="0.65"/>
  </g>

  <!-- Center scattered -->
  <g transform="translate(200,200)" opacity="0.3">
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(0)"/>
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(60)"/>
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(120)"/>
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(180)"/>
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(240)"/>
    <ellipse cx="0" cy="-10" rx="3.5" ry="8" fill="#7aad70" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="3" fill="#d4af37" opacity="0.5"/>
  </g>

  <!-- Bottom-right cluster -->
  <g transform="translate(360,360)" opacity="0.5">
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(0)"/>
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(60)"/>
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(120)"/>
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(180)"/>
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(240)"/>
    <ellipse cx="0" cy="-13" rx="5" ry="10" fill="#c4dbbe" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="4" fill="#d4af37" opacity="0.6"/>
  </g>

  <!-- Scattered leaf sprigs -->
  <g transform="translate(260,130)" opacity="0.35">
    <path d="M0,0 Q6,-10 12,-6 Q6,0 0,0" fill="#5a9451"/>
    <path d="M0,0 Q-3,-11 3,-14 Q3,-3 0,0" fill="#5a9451"/>
    <path d="M0,0 Q10,-4 14,4 Q5,4 0,0" fill="#5a9451"/>
  </g>

  <g transform="translate(140,290)" opacity="0.35">
    <path d="M0,0 Q-6,-10 -12,-6 Q-6,0 0,0" fill="#5a9451"/>
    <path d="M0,0 Q3,-11 -3,-14 Q-3,-3 0,0" fill="#5a9451"/>
  </g>

  <!-- Small accent flowers -->
  <g transform="translate(170,90)" opacity="0.4">
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c4dbbe" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c4dbbe" transform="rotate(72)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c4dbbe" transform="rotate(144)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c4dbbe" transform="rotate(216)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c4dbbe" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#d4af37" opacity="0.55"/>
  </g>

  <g transform="translate(310,240)" opacity="0.4">
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#a3c89a" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#a3c89a" transform="rotate(72)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#a3c89a" transform="rotate(144)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#a3c89a" transform="rotate(216)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#a3c89a" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#d4af37" opacity="0.55"/>
  </g>
</svg>
